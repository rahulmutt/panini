[tools]
rust = { version = "1.97.1", components = "clippy,rustfmt" }

[tasks.build]
run = "cargo build --workspace"

[tasks.test]
run = "cargo test --workspace"

[tasks.lint]
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.fmt]
run = "cargo fmt --all"

[tasks.fmt-check]
run = "cargo fmt --all --check"

[tasks.mutants]
# --test-workspace=true is required: cargo-mutants otherwise defaults to
# running only the mutated package's own tests, which misses the
# `panini` crate's golden paradigm/trace/roundtrip tests that are the
# actual gate on the guarded rules in panini-prakriya.
run = "cargo mutants --package panini-prakriya --test-workspace=true"

[tasks.audit]
run = "cargo audit && cargo deny check"
