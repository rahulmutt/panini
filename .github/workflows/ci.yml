name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: build + test + lint (rust 1.83, mise-pinned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Ensure clippy component
        run: rustup component add clippy --toolchain 1.83.0-x86_64-unknown-linux-gnu
      - name: Build
        run: mise run build
      - name: Test
        run: mise run test
      - name: Lint (clippy -D warnings)
        run: mise run lint
