name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC — audit job

jobs:
  build-test-lint:
    name: build + test + lint (rust 1.97, mise-pinned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Format check
        run: mise run fmt-check
      - name: Build
        run: mise run build
      - name: Test
        run: mise run test
      - name: Lint (clippy -D warnings)
        run: mise run lint

  audit:
    name: supply-chain audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      MISE_ENV: dev
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Audit (cargo audit + cargo deny)
        run: mise run audit
